<!DOCTYPE html>
<html>
<head>
    <title>My First Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }

        section {
            padding: 20px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: #ddd;
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
        }

        img {
            width: 300px;
            margin-top: 10px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            background: #4CAF50;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
        }

        a:hover {
            background: #45a049;
        }

        footer {
            margin-top: 20px;
            padding: 10px;
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>This is my first webpage 🎉</p>
</header>

<section>
    <h2>My Hobbies</h2>
    <ul>
        <li>📚 Reading</li>
        <li>🎮 Gaming</li>
        <li>💻 Coding</li>
    </ul>

    <img src="https://www.allerin.com/blog/wp-content/uploads/2018/03/There-is-no-escaping-the-holographic-technology-3.jpg" alt="sample image">

    <br>
    <a href="https://github.com" target="_blank">Visit GitHub</a>
</section>

<footer>
    <p>© 2026 My First Website</p>
</footer>

</body>
</html>
